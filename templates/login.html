<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sezhiyam Foundation</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Shared stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">

    <div class="login-container">
        <div class="glass-card login-card text-center">

            <!-- Branding -->
            <div class="login-header mb-4">
                <div class="login-logo-box mb-3 overflow-hidden">
                    <img src="{{ url_for('static', filename='logo_new_1.png') }}" alt="Sezhiyam Logo"
                        style="width: 60px; height: 60px; object-fit: contain;">
                </div>
                <h2 class="login-title">Secure Login</h2>
                <p class="login-subtitle text-secondary">Sezhiyam Foundation</p>
            </div>

            <!-- Flask Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show text-start py-2 px-3 small mb-3 border-0"
                role="alert">
                <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ message }}
                <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- Login Form -->
            <form action="{{ url_for('main.login') }}" method="POST" class="text-start">
                <div class="mb-3">
                    <label for="username" class="form-label text-secondary small fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-input border-dark-border text-secondary">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control bg-dark-input border-dark-border text-white"
                            id="username" name="username" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-secondary small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-input border-dark-border text-secondary">
                            <i class="bi bi-key-fill"></i>
                        </span>
                        <input type="password" class="form-control bg-dark-input border-dark-border text-white"
                            id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-gradient w-100 py-2.5 fw-bold mb-3">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Log In
                </button>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
